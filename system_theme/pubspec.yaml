name: system_theme
description: A Flutter Plugin to retrieve and listen to the system's accent color. Supports Android, iOS, Web, Windows, macOS, and Linux.
version: 3.2.0
repository: https://github.com/bdlukaa/system_theme
homepage: https://github.com/bdlukaa/system_theme/tree/master/system_theme

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=1.20.0"

dependencies:
  system_theme_web: ^0.0.4
    # path: ../system_theme_web/
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^1.0.4

flutter:
  plugin:
    platforms:
      windows:
        pluginClass: SystemThemePlugin
      macos:
        package: com.bruno.system_theme
        pluginClass: SystemThemePlugin
      ios:
        package: com.bruno.system_theme
        pluginClass: SystemThemePlugin
      android:
        package: com.bruno.system_theme
        pluginClass: SystemThemePlugin
      web:
        default_package: system_theme_web
      linux:
        package: com.bruno.system_theme
        pluginClass: SystemThemePlugin
